---
- hosts: [dockerhost]

  tasks:
  - name: stop existing container
    command: docker stop regapp-server
    ignore_errors: yes

  - name: remove the container
    command: docker rm regapp-server
    ignore_errors: yes

  - name: remove the image
    command: docker rmi adhamm74/regapp:latest
    ignore_errors: yes
 
  - name: deploy a container
    command: docker run -d --name regapp-server -p 8082:8080 adhamm74/regapp:latest
